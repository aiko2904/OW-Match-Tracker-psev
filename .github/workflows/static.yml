        // --- CSV Engine --- //
        function parseCSVString(str) {
            const arr = []; let quote = false; let col = 0, row = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        function handleImportCSV(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const rows = parseCSVString(e.target.result);
                if (rows.length < 2) return alert("File is empty or invalid.");

                const headers = rows[0].map(h => h.trim());
                const col = {}; headers.forEach((h, i) => col[h] = i);

                let importCount = 0; let foundNewHeroes = false; let foundNewWarnings = false;

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length < 5) continue;

                    let rawTs = row[col['Timestamps']] || '';
                    let parsedTs = [];
                    if(rawTs) {
                        parsedTs = rawTs.split('|').map(ts => {
                            let parts = ts.split('~');
                            if(parts.length === 2) return {time: parts[0].trim(), note: parts[1].trim()};
                            return null;
                        }).filter(x => x !== null);
                    }

                    // Handle legacy warnings or new warnings array
                    let warningsArr = [];
                    if (col['Warnings'] !== undefined) {
                        let wRaw = row[col['Warnings']];
                        if(wRaw) warningsArr = wRaw.split(';').map(x=>x.trim()).filter(x=>x);
                    } else {
                        if(row[col['Warn_Spike']] === 'true') warningsArr.push(defaultWarnings[0]);
                        if(row[col['Warn_Jab']] === 'true') warningsArr.push(defaultWarnings[1]);
                        if(row[col['Warn_GreenLight']] === 'true') warningsArr.push(defaultWarnings[2]);
                    }

                    const match = {
                        id: Date.now() + i,
                        date: row[col['Date']] || new Date().toLocaleString(),
                        folder: row[col['Folder']] || 'Uncategorized',
                        block: row[col['Macro_Block']] || 'Unassigned',
                        title: row[col['Title']] || '',
                        intent: row[col['Intent']] || '',
                        labels: row[col['Labels']] ? row[col['Labels']].split(';').map(x=>x.trim()).filter(x=>x) : [],
                        timestamps: parsedTs,
                        queue: row[col['Queue']] || 'Solo',
                        isScrim: row[col['Is_Scrim']] === 'true',
                        warmup: row[col['Warmup']] === 'true',
                        replay: row[col['Replay_Code']] || 'N/A',
                        map: row[col['Map']] || 'Unknown',
                        heroes: row[col['Heroes']] || '',
                        result: row[col['Result']] || 'Draw',
                        
                        mechanics: parseInt(row[col['Mechanics']]) || 5,
                        s1: parseInt(row[col['S_Scouting']]) || 5, s2: parseInt(row[col['S_AngleBreak']]) || 5, s3: parseInt(row[col['S_Resources']]) || 5,
                        j1: parseInt(row[col['J_Tempo']]) || 5, j2: parseInt(row[col['J_Efficiency']]) || 5, j3: parseInt(row[col['J_Cover']]) || 5,
                        sp1: parseInt(row[col['SP_GreenLight']]) || 5, sp2: parseInt(row[col['SP_Resources']]) || 5, sp3: parseInt(row[col['SP_TargetSwitch']]) || 5,
                        
                        feedbackScout: row[col['Feedback_Scout']] || '', feedbackJab: row[col['Feedback_Jab']] || '', feedbackSpike: row[col['Feedback_Spike']] || '',
                        warnings: warningsArr
                    };

                    if (!folders.includes(match.folder)) folders.push(match.folder);

                    if (match.heroes && match.heroes !== "None selected") {
                        match.heroes.split(' + ').forEach(h => {
                            if (h && !defaultHeroes.includes(h) && !customHeroes.includes(h)) {
                                customHeroes.push(h); foundNewHeroes = true;
                            }
                        });
                    }

                    if (match.warnings) {
                        match.warnings.forEach(w => {
                            if (!defaultWarnings.includes(w) && !customWarnings.includes(w)) {
                                customWarnings.push(w); foundNewWarnings = true;
                            }
                        });
                    }

                    matches.push(match); importCount++;
                }

                matches.sort((a, b) => new Date(b.date) - new Date(a.date));
                if (foundNewHeroes) localStorage.setItem('owCustomHeroes', JSON.stringify(customHeroes));
                if (foundNewWarnings) localStorage.setItem('owCustomWarnings', JSON.stringify(customWarnings));
                saveSystemState(); renderHeroes(); renderWarnings(); renderDashboard(); renderHistory();
                alert(`Successfully imported ${importCount} matches!`);
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function exportCSV() {
            if (matches.length === 0) return alert('No data to export!');
            const headers = [
                'Date', 'Folder', 'Macro_Block', 'Title', 'Intent', 'Labels', 'Timestamps', 'Queue', 'Is_Scrim', 'Warmup', 'Map', 'Heroes', 'Result', 'Replay_Code',
                'Mechanics', 'S_Scouting', 'S_AngleBreak', 'S_Resources', 'J_Tempo', 'J_Efficiency', 'J_Cover', 'SP_GreenLight', 'SP_Resources', 'SP_TargetSwitch',
                'Feedback_Scout', 'Feedback_Jab', 'Feedback_Spike', 'Warnings'
            ];
            
            const csvRows = [headers.join(',')];
            matches.forEach(m => {
                let tsStr = m.timestamps ? m.timestamps.map(ts => `${ts.time}~${ts.note}`).join('|') : '';
                let safeWarns = m.warnings ? m.warnings.join(';') : '';

                const row = [
                    `"${m.date}"`, `"${m.folder}"`, `"${m.block || 'Unassigned'}"`, `"${m.title ? m.title.replace(/"/g, '""') : ''}"`, `"${m.intent ? m.intent.replace(/"/g, '""') : ''}"`, 
                    `"${m.labels ? m.labels.join(';') : ''}"`, `"${tsStr.replace(/"/g, '""')}"`, `"${m.queue || 'Solo'}"`, m.isScrim, m.warmup || false, `"${m.map}"`, `"${m.heroes}"`, `"${m.result}"`, `"${m.replay}"`,
                    m.mechanics || 5, m.s1, m.s2, m.s3, m.j1, m.j2, m.j3, m.sp1, m.sp2, m.sp3,
                    `"${m.feedbackScout ? m.feedbackScout.replace(/"/g, '""') : ''}"`, `"${m.feedbackJab ? m.feedbackJab.replace(/"/g, '""') : ''}"`, `"${m.feedbackSpike ? m.feedbackSpike.replace(/"/g, '""') : ''}"`,
                    `"${safeWarns.replace(/"/g, '""')}"`
                ];
                csvRows.push(row.join(','));
            });

            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', ''); a.setAttribute('href', url); a.setAttribute('download', 'ow_tracker_psevpsevpsev.csv');
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        function clearHistory() {
            if(confirm("Are you sure you want to clear your local history? Export your CSV first!")) {
                matches = []; folders = ['Uncategorized']; activeFolder = 'Uncategorized'; customHeroes = []; customWarnings = [];
                localStorage.removeItem('owCustomHeroes'); localStorage.removeItem('owCustomWarnings');
                saveSystemState(); renderHeroes(); renderWarnings(); renderDashboard(); renderHistory();
            }
        }

        renderHeroes(); renderWarnings(); renderDashboard(); renderHistory();
    </script>
</body>
</html>
